site_name: GFK Prüfungsvorbereitung
site_url: https://bobobass84.github.io/BB84.GFK/
docs_dir: docs

nav:
  - Übersicht: Prüfungsschwerpunkte.md
  - Schwerpunkte:
      - Arbeitsrecht: Schwerpunkte/Arbeitsrecht.md
      - Bürgerliches Gesetzbuch: Schwerpunkte/Bürgerliches Gesetzbuch.md
      - Controlling: Schwerpunkte/Controlling.md
      - Finanzierung: Schwerpunkte/Finanzierung.md
      - Gründung im Handwerk: Schwerpunkte/Gründung im Handwerk.md
      - Kommunikation: Schwerpunkte/Kommunikation.md
      - Kommunikations- und Präsentationstechniken: Schwerpunkte/Kommunikations- und Präsentationstechniken.md
      - Kosten-Leistungs-Rechnung: Schwerpunkte/Kosten-Leistungs-Rechnung.md
      - Marketing: Schwerpunkte/Marketing.md
      - Organisation: Schwerpunkte/Organisation.md
      - Personalwesen: Schwerpunkte/Personalwesen.md
      - Rechtsformen: Schwerpunkte/Rechtsformen.md
      - Rentabilitätsvorschau: Schwerpunkte/Rentabilitätsvorschau.md
      - Steuern: Schwerpunkte/Steuern.md
      - Wirtschaftsrecht: Schwerpunkte/Wirtschaftsrecht.md

theme:
  name: material
  language: de
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Dunkelmodus
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Hellmodus
  features:
    - navigation.expand
    - navigation.top
    - navigation.sections
    - search.highlight
    - search.suggest
    - content.code.copy
    - toc.follow

markdown_extensions:
  - plantuml_markdown:
      server: https://www.plantuml.com/plantuml
  - pymdownx.arithmatex:
      generic: true
  - admonition
  - pymdownx.details
  - pymdownx.superfences

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - search:
      lang: de
  - redirects:
      redirect_maps:
        "index.md": "Prüfungsschwerpunkte.md"
  - callouts
